<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="Viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Formulários</h1>
    <form>
        <input type="text" placeholder="Seu nome" />
        <br />
        <label for="email">Seu email</label>
        <input id="email" type="email" />
        <br />
        <input type="tel" placeholder="Seu Telefone" /> <br /> 
        <input type="number" max="10" min="1" step="2"/> <br />
        <input type="file" /> <br />
        <input type="color" /> <br />
        <input type="checkbox" id="checkbox-termos" /> <label for="checkbox-termos">Aceito os Termos</label>
        <p>
            Qual sua cor favorita ?
        </p>
        <input type="radio" name="cor-fav" id="cor-vermelha" /> <label for="cor-vermelha">vemelho</label>
        <input type="radio" name="cor-fav" id="cor-verde" /> <label for="cor-verde">verde</label>
        <input type="radio" name="cor-fav" id="cor-azul" /> <label for="cor-azul">azul</label>
        <br />
        <label>Qual seu filme favorito ?</label>
        <select multiple>
            <option>Filme A</option>
            <option>Filme B</option>
            <option>Fillme C</option>
        </select>
        <br />
        <textarea></textarea>
        <button type="submit">
            Enviar
        </button>
        <button type="reset">
            Limpar
        </button>
    </form>
</body>
</html>
